<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store FAQ & Ordering Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            max-height: 200px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input[type="radio"] {
            width: auto;
            cursor: pointer;
        }

        .radio-option label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .character-count {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .response-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .response-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .response-box.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .response-content {
            color: #333;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .order-details {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .order-details .response-title {
            color: #4caf50;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            border-left-color: #f44336;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .error-message .response-title {
            color: #f44336;
        }

        .copy-button {
            background: #f0f0f0;
            color: #333;
            padding: 8px 12px;
            font-size: 12px;
            margin-top: 10px;
        }

        .copy-button:hover {
            background: #e0e0e0;
        }

        .history-section {
            max-height: 300px;
            overflow-y: auto;
            border-top: 2px solid #e0e0e0;
            padding-top: 15px;
            margin-top: 15px;
        }

        .history-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .history-timestamp {
            color: #999;
            font-size: 11px;
        }

        .history-message {
            color: #333;
            margin: 5px 0;
        }

        .clear-history {
            background: #ff9800;
            padding: 8px 16px;
            font-size: 12px;
            margin-top: 10px;
        }

        .success-message {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
        }

        .success-message.active {
            display: block;
        }

        .store-info {
            background: #f0f4ff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel: Input -->
        <div class="panel">
            <h1>🤖 Store Bot</h1>
            <p class="subtitle">Ask questions or place orders</p>

            <form id="botForm">
                <!-- Store Selection -->
                <div class="form-group">
                    <label for="store">Select Store *</label>
                    <select id="store" required>
                        <option value="">-- Choose a store --</option>
                        <option value="store_1">🍕 Pizza Palace</option>
                        <option value="store_2">🍔 Burger Barn</option>
                        <option value="store_3">☕ Coffee & Vibes</option>
                        <option value="store_4">🍣 Sushi House</option>
                        <option value="store_5">🍵 Chai Wala</option>
                    </select>
                </div>

                <div id="storeInfo" class="store-info" style="display: none;"></div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">Your Phone Number *</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="+91-9876543210"
                        required
                        pattern="[+\d\-\s]{10,}"
                    >
                </div>

                <!-- Message Type -->
                <div class="form-group">
                    <label>Message Type</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="faq" 
                                name="messageType" 
                                value="faq"
                                checked
                            >
                            <label for="faq">❓ FAQ</label>
                        </div>
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="order" 
                                name="messageType" 
                                value="order"
                            >
                            <label for="order">🛒 Order</label>
                        </div>
                    </div>
                </div>

                <!-- Message Input -->
                <div class="form-group">
                    <label for="message">Your Message *</label>
                    <textarea 
                        id="message" 
                        placeholder="Ask a question or describe what you want to order..."
                        required
                        maxlength="500"
                    ></textarea>
                    <div class="character-count">
                        <span id="charCount">0</span>/500
                    </div>
                </div>

                <button type="submit" id="submitBtn">Send Message</button>
            </form>
        </div>

        <!-- Right Panel: Response -->
        <div class="panel response-panel">
            <h1>💬 Response</h1>
            <p class="subtitle">Bot's reply appears here</p>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Processing your message...</p>
            </div>

            <div id="successMessage" class="success-message"></div>

            <div id="errorMessage" class="response-box error-message">
                <div class="response-title">⚠️ Error</div>
                <div id="errorContent" class="response-content"></div>
            </div>

            <div id="faqResponse" class="response-box">
                <div class="response-title">📚 FAQ Answer</div>
                <div id="faqContent" class="response-content"></div>
                <button class="copy-button" onclick="copyToClipboard('faqContent')">
                    📋 Copy Response
                </button>
            </div>

            <div id="orderResponse" class="response-box order-details">
                <div class="response-title">✅ Order Confirmation</div>
                <div id="orderContent" class="response-content"></div>
                <button class="copy-button" onclick="copyToClipboard('orderContent')">
                    📋 Copy Order Details
                </button>
            </div>

            <div class="history-section">
                <h3 style="color: #333; margin-bottom: 10px; font-size: 14px;">📝 History</h3>
                <div id="history"></div>
                <button class="clear-history" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook/ask';
        const STORES = {
            store_1: { name: 'Pizza Palace', emoji: '🍕' },
            store_2: { name: 'Burger Barn', emoji: '🍔' },
            store_3: { name: 'Coffee & Vibes', emoji: '☕' },
            store_4: { name: 'Sushi House', emoji: '🍣' },
            store_5: { name: 'Chai Wala', emoji: '🍵' }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('botForm').addEventListener('submit', handleSubmit);
            document.getElementById('message').addEventListener('input', updateCharCount);
            document.getElementById('store').addEventListener('change', updateStoreInfo);
            loadHistory();
        });

        // Update character count
        function updateCharCount() {
            const count = document.getElementById('message').value.length;
            document.getElementById('charCount').textContent = count;
        }

        // Update store info
        function updateStoreInfo() {
            const storeId = document.getElementById('store').value;
            const storeInfo = document.getElementById('storeInfo');
            
            if (storeId && STORES[storeId]) {
                const store = STORES[storeId];
                storeInfo.innerHTML = `${store.emoji} <strong>${store.name}</strong> selected`;
                storeInfo.style.display = 'block';
            } else {
                storeInfo.style.display = 'none';
            }
        }

        // Handle form submission
        async function handleSubmit(e) {
            e.preventDefault();

            const store = document.getElementById('store').value;
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            const messageType = document.querySelector('input[name="messageType"]:checked').value;

            if (!store || !message || !phone) {
                showError('Please fill all required fields');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            hideResponses();

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        storeId: store,
                        storeName: STORES[store].name,
                        sessionId: generateSessionId(),
                        customerPhone: phone,
                        messageType: messageType
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    displayResponse(data);
                    addToHistory(message, data);
                    document.getElementById('botForm').reset();
                    updateCharCount();
                } else {
                    showError(data.errorMessage || 'Failed to process request');
                }
            } catch (error) {
                showError('Error: ' + error.message);
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Display response
        function displayResponse(data) {
            hideResponses();

            if (data.messageType === 'order' && data.orderId) {
                document.getElementById('orderResponse').classList.add('active');
                document.getElementById('orderContent').innerHTML = `
                    <p><strong>Order ID:</strong> ${data.orderId}</p>
                    <p><strong>Store:</strong> ${data.storeName}</p>
                    <p><strong>Status:</strong> Pending</p>
                    <p><strong>Message:</strong> ${data.reply}</p>
                    <p style="margin-top: 10px; color: #666; font-size: 12px;">
                        You will receive updates on WhatsApp
                    </p>
                `;
                document.getElementById('successMessage').classList.add('active');
                document.getElementById('successMessage').textContent = '✅ Order placed successfully!';
            } else {
                document.getElementById('faqResponse').classList.add('active');
                document.getElementById('faqContent').innerHTML = `
                    <p>${escapeHtml(data.reply || 'No response received')}</p>
                    <p style="margin-top: 10px; color: #666; font-size: 12px;">
                        From: ${data.storeName}
                    </p>
                `;
            }
        }

        // Hide all responses
        function hideResponses() {
            document.getElementById('faqResponse').classList.remove('active');
            document.getElementById('orderResponse').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('successMessage').classList.remove('active');
        }

        // Show error
        function showError(message) {
            document.getElementById('errorMessage').classList.add('active');
            document.getElementById('errorContent').textContent = message;
        }

        // Copy to clipboard
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        // History management
        function addToHistory(message, response) {
            let history = JSON.parse(localStorage.getItem('botHistory') || '[]');
            history.unshift({
                timestamp: new Date().toLocaleString(),
                message: message,
                response: response.reply,
                type: response.messageType
            });
            history = history.slice(0, 10); // Keep last 10
            localStorage.setItem('botHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('botHistory') || '[]');
            const historyDiv = document.getElementById('history');
            
            if (history.length === 0) {
                historyDiv.innerHTML = '<p style="color: #999; font-size: 12px;">No history yet</p>';
                return;
            }

            historyDiv.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-timestamp">${item.timestamp}</div>
                    <div class="history-message"><strong>You:</strong> ${escapeHtml(item.message.substring(0, 50))}...</div>
                    <div class="history-message"><strong>Bot:</strong> ${escapeHtml(item.response.substring(0, 50))}...</div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if (confirm('Clear all history?')) {
                localStorage.removeItem('botHistory');
                loadHistory();
            }
        }

        // Utility functions
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
