<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ & Ordering Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .radio-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .response-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .response-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .response-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .response-label {
            font-weight: 600;
            color: #667eea;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .response-text {
            color: #333;
            line-height: 1.6;
            font-size: 14px;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
            padding: 0;
            text-decoration: underline;
            font-weight: 500;
        }

        .copy-btn:hover {
            color: #764ba2;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: pulse 1.5s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-box {
            background: #fee;
            border-left-color: #d32f2f;
            color: #d32f2f;
        }

        .success-box {
            background: #efe;
            border-left-color: #388e3c;
            color: #388e3c;
        }

        .hidden {
            display: none;
        }

        .history-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .history-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            border-left: 3px solid #667eea;
        }

        .history-time {
            color: #999;
            font-size: 12px;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 FAQ & Ordering Bot</h1>
            <p>Get instant answers and place orders</p>
        </div>

        <div class="content">
            <form id="chatForm">
                <!-- Store Selection -->
                <div class="form-group">
                    <label for="store">Select Store *</label>
                    <select id="store" required>
                        <option value="">-- Choose a store --</option>
                    </select>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" placeholder="+91-9876543210" required>
                </div>

                <!-- Message Type -->
                <div class="form-group">
                    <label>Message Type</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="typeFaq" name="messageType" value="faq" checked>
                            <label for="typeFaq">FAQ</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="typeOrder" name="messageType" value="order">
                            <label for="typeOrder">Order</label>
                        </div>
                    </div>
                </div>

                <!-- Message Input -->
                <div class="form-group">
                    <label for="message">Your Message *</label>
                    <textarea id="message" placeholder="Ask a question or describe your order..." required></textarea>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn-submit">
                        <span id="submitText">Send Message</span>
                    </button>
                    <button type="reset" class="btn-clear">Clear</button>
                </div>
            </form>

            <!-- Response Section -->
            <div id="responseSection" class="response-section hidden">
                <h2>Response</h2>
                <div id="responseBox" class="response-box"></div>
                <button class="copy-btn" onclick="copyToClipboard()">📋 Copy Response</button>
            </div>

            <!-- History Section -->
            <div id="historySection" class="history-section hidden">
                <h2>Recent Conversations</h2>
                <div id="historyList"></div>
                <button class="btn-clear" onclick="clearHistory()" style="width: 100%; margin-top: 10px;">Clear History</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            GROQ_API_URL: 'https://api.groq.com/openai/v1/chat/completions',
            GROQ_API_KEY: 'gsk_YOUR_GROQ_API_KEY_HERE',  // Replace with your actual Groq API key
            GOOGLE_SHEETS_API_KEY: 'AIzaSyD6E9U2OZ4KMqOscAYfetq6nvc2kbJ7qzg',
            SHEET_ID: '1AoMmpRscO5kK-OoKn991iKGUcRSOg92EDEKP-sX8bis'
        };

        let storesData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadStores();
            loadHistory();
        });

        async function loadStores() {
            storesData = [
                {
                    id: 'store_1',
                    name: 'Pizza Palace',
                    phone: '+91-9876543210',
                    faqContext: `Category: hours
Q: What are your opening hours?
A: We're open Mon-Thu 11am-11pm, Fri-Sat 11am-12am, Sun 12pm-11pm

---

Category: delivery
Q: Do you deliver?
A: Yes! We deliver within 5km. Free delivery on orders over ₹500

---

Category: payment
Q: What payment methods do you accept?
A: We accept cash, UPI, credit/debit cards, Google Pay, PhonePe, and Paytm

---

Category: menu
Q: Do you have vegan options?
A: Yes, we have 5 delicious vegan pizzas: vegan pepperoni, vegan cheese, vegan supreme, vegan BBQ, and vegan garden fresh.

---

Category: pricing
Q: What's the delivery charge?
A: Free delivery on orders over ₹500. Orders below ₹500 have a ₹50 delivery charge`
                },
                {
                    id: 'store_2',
                    name: 'Burger Barn',
                    phone: '+91-9876543211',
                    faqContext: `Category: delivery
Q: Do you deliver?
A: Yes, we deliver within 7km

---

Category: payment
Q: What payment methods?
A: All major payment methods accepted`
                },
                {
                    id: 'store_3',
                    name: 'Coffee & Vibes',
                    phone: '+91-9876543212',
                    faqContext: `Category: hours
Q: Opening hours?
A: 7am-9pm daily

---

Category: menu
Q: Vegan options?
A: Yes, we have almond milk and oat milk options`
                },
                {
                    id: 'store_4',
                    name: 'Dominos Pizza',
                    phone: '+91-9876543214',
                    faqContext: `Category: delivery
Q: Do you deliver?
A: Yes, we deliver within 10km. Free delivery on orders over ₹600

---

Category: hours
Q: What are your opening hours?
A: We're open 10am-11pm daily

---

Category: payment
Q: What payment methods do you accept?
A: We accept cash, UPI, cards, Google Pay, PhonePe

---

Category: menu
Q: Do you have vegan options?
A: Yes, we have vegan pizzas with plant-based cheese

---

Category: pricing
Q: What's the delivery charge?
A: Free delivery on orders over ₹600. Orders below ₹600 have ₹100 delivery charge`
                },
                {
                    id: 'store_5',
                    name: 'Subway',
                    phone: '+91-9876543215',
                    faqContext: `Category: delivery
Q: Do you deliver?
A: Yes, we deliver within 8km. Free delivery on orders over ₹400

---

Category: hours
Q: Opening hours?
A: We're open 9am-10pm daily

---

Category: menu
Q: Do you have vegetarian options?
A: Yes, we have salad and veggie subs

---

Category: payment
Q: Payment methods?
A: Cash, cards, UPI, Google Pay, PhonePe accepted`
                },
                {
                    id: 'store_6',
                    name: 'Starbucks',
                    phone: '+91-9876543216',
                    faqContext: `Category: delivery
Q: Do you deliver?
A: Yes, we deliver within 5km. Free delivery on orders over ₹300

---

Category: hours
Q: Opening hours?
A: 6am-9pm Monday to Friday, 7am-8pm weekends

---

Category: menu
Q: Vegan options?
A: Yes, we have almond milk, oat milk, and soy milk options

---

Category: loyalty
Q: Do you have loyalty program?
A: Yes, Starbucks Rewards members get exclusive benefits`
                },
                {
                    id: 'store_7',
                    name: 'Biryani House',
                    phone: '+91-9876543217',
                    faqContext: `Category: delivery
Q: Do you deliver?
A: Yes, we deliver within 7km. Free delivery on orders over ₹500

---

Category: hours
Q: Opening hours?
A: We're open 11am-11pm daily

---

Category: menu
Q: Vegan biryani available?
A: Yes, we have paneer biryani and vegetable biryani

---

Category: spice
Q: Can I customize spice level?
A: Yes, you can request mild, medium, or spicy`
                },
                {
                    id: 'store_8',
                    name: 'Juice Bar',
                    phone: '+91-9876543218',
                    faqContext: `Category: delivery
Q: Do you deliver?
A: Yes, we deliver fresh juices within 3km. Free delivery on orders over ₹200

---

Category: hours
Q: Opening hours?
A: 7am-9pm daily

---

Category: menu
Q: Are juices fresh?
A: Yes, all juices are made fresh on order

---

Category: health
Q: Do you have sugar-free options?
A: Yes, we offer sugar-free and low-calorie juice blends`
                }
            ];

            const storeSelect = document.getElementById('store');
            storesData.forEach(store => {
                const option = document.createElement('option');
                option.value = store.id;
                option.textContent = store.name;
                storeSelect.appendChild(option);
            });
        }

        function getSelectedStore() {
            const storeId = document.getElementById('store').value;
            return storesData.find(s => s.id === storeId);
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const store = getSelectedStore();
            const phone = document.getElementById('phone').value;
            const messageType = document.querySelector('input[name="messageType"]:checked').value;
            const message = document.getElementById('message').value;

            if (!store) {
                alert('Please select a store');
                return;
            }

            const submitBtn = document.querySelector('.btn-submit');
            const submitText = document.getElementById('submitText');
            submitBtn.disabled = true;
            submitText.innerHTML = '<span class="loading"></span>Sending...';

            try {
                const sessionId = generateSessionId();
                
                const response = await sendToGroq({
                    storeId: store.id,
                    storeName: store.name,
                    customerPhone: phone,
                    sessionId: sessionId,
                    userMessage: message,
                    messageType: messageType,
                    faqContext: store.faqContext,
                    timestamp: new Date().toISOString()
                });

                displayResponse(response);

                saveToHistory({
                    store: store.name,
                    message: message,
                    response: response.aiResponse,
                    type: messageType,
                    timestamp: new Date().toLocaleString()
                });

                await saveToGoogleSheets({
                    timestamp: new Date().toISOString(),
                    storeId: store.id,
                    storeName: store.name,
                    sessionId: sessionId,
                    customerPhone: phone,
                    userQuestion: message,
                    aiResponse: response.aiResponse,
                    messageType: messageType
                });

            } catch (error) {
                displayError(error.message);
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitText.innerHTML = 'Send Message';
            }
        });

        async function sendToGroq(data) {
            const response = await fetch(CONFIG.GROQ_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'mixtral-8x7b-32768',
                    messages: [
                        {
                            role: 'system',
                            content: `You are a helpful FAQ assistant for ${data.storeName}. Answer questions based on the provided FAQ context. Be concise and helpful.`
                        },
                        {
                            role: 'user',
                            content: `FAQ Context: ${data.faqContext}\n\nCustomer Question: ${data.userMessage}\n\nAnswer based only on the FAQ provided above.`
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 1024
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Failed to get response from Groq API');
            }

            const result = await response.json();
            const aiResponse = result.choices?.[0]?.message?.content || 'No response received';

            return {
                storeId: data.storeId,
                storeName: data.storeName,
                aiResponse: aiResponse.trim(),
                timestamp: new Date().toISOString(),
                status: 'success'
            };
        }

        async function saveToGoogleSheets(data) {
            try {
                console.log('Data to save to Google Sheets:', data);
            } catch (error) {
                console.error('Error saving to Google Sheets:', error);
            }
        }

        function displayResponse(response) {
            const responseSection = document.getElementById('responseSection');
            const responseBox = document.getElementById('responseBox');

            responseBox.innerHTML = `
                <div class="response-label">${response.storeName}</div>
                <div class="response-text">${response.aiResponse}</div>
                <div style="margin-top: 10px; font-size: 12px; color: #999;">
                    ${new Date(response.timestamp).toLocaleString()}
                </div>
            `;

            responseSection.classList.remove('hidden');
            responseSection.scrollIntoView({ behavior: 'smooth' });
        }

        function displayError(message) {
            const responseSection = document.getElementById('responseSection');
            const responseBox = document.getElementById('responseBox');

            responseBox.innerHTML = `
                <div class="response-label">Error</div>
                <div class="response-text">${message}</div>
            `;

            responseBox.classList.add('error-box');
            responseSection.classList.remove('hidden');
            responseSection.scrollIntoView({ behavior: 'smooth' });

            setTimeout(() => {
                responseBox.classList.remove('error-box');
            }, 5000);
        }

        function saveToHistory(item) {
            let history = JSON.parse(localStorage.getItem('chatHistory')) || [];
            history.unshift(item);
            history = history.slice(0, 10);
            localStorage.setItem('chatHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('chatHistory')) || [];
            const historyList = document.getElementById('historyList');
            const historySection = document.getElementById('historySection');

            if (history.length === 0) {
                historySection.classList.add('hidden');
                return;
            }

            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item">
                    <div>
                        <strong>${item.store}</strong>
                        <span class="badge">${item.type.toUpperCase()}</span>
                    </div>
                    <div style="margin-top: 5px; color: #666;">${item.message}</div>
                    <div class="history-time">${item.timestamp}</div>
                </div>
            `).join('');

            historySection.classList.remove('hidden');
        }

        function copyToClipboard() {
            const responseText = document.querySelector('.response-text').textContent;
            navigator.clipboard.writeText(responseText).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function clearHistory() {
            if (confirm('Clear all conversation history?')) {
                localStorage.removeItem('chatHistory');
                document.getElementById('historySection').classList.add('hidden');
            }
        }

        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
    </script>
</body>
</html>
